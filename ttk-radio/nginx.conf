server {
    listen 80;
    server_name _;
    client_max_body_size 1100M;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API proxy → FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # WebSocket proxy → FastAPI backend
    location /ws {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # Video WebSocket (push + watch)
    location /ws/video/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        # Allow large binary frames for video chunks
        proxy_buffer_size      128k;
        proxy_buffers          4 256k;
    }

    # Media files
    location /media/ {
        proxy_pass http://backend:8000/media/;
        expires    7d;
        add_header Cache-Control "public";
    }

    # Audio stream → Icecast (so frontend uses same origin)
    location /stream {
        proxy_pass              http://icecast:8000/stream;
        proxy_http_version      1.1;
        proxy_set_header        Host       icecast;
        proxy_buffering         off;
        proxy_read_timeout      3600s;
        add_header              Access-Control-Allow-Origin *;
        add_header              Cache-Control no-cache;
    }

    # Icecast admin (optional, useful during demo)
    location /icecast/ {
        proxy_pass   http://icecast:8000/;
        proxy_set_header Host icecast;
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}
